<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2196F3">
    <title>RayoShield Exam - App</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="assets/logo.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        /* ═══════════════════════════════════════════════════════════════
        RAYOSHIELD EXAM - ESTILOS ACTUALIZADOS (SmartCot Style)
        ═══════════════════════════════════════════════════════════════ */
        :root {
            /* Dark Theme (Default) */
            --white:   #1e2330;
            --bg:      #161b27;
            --bg2:     #1a2035;
            --surface: #1e2330;
            --border:  #2a3347;
            --border2: #334060;
            --ink:     #e8edf5;
            --ink2:    #c4cde0;
            --ink3:    #8a97b4;
            --ink4:    #5a6a8a;
            --blue:    #2196F3;
            --blue-l:  #1a2540;
            --blue-m:  #253a5e;
            --indigo:  #7c6ff0;
            --teal:    #2cb8a8;
            --amber:   #f0a742;
            --rose:    #f0436a;
            --green:   #3dba72;
            --radius:    12px;
            --radius-sm: 8px;
            --radius-lg: 18px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,.25);
            --shadow:    0 4px 16px rgba(0,0,0,.35);
            --shadow-lg: 0 12px 40px rgba(0,0,0,.5);
            --font: 'Outfit', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        /* Light Theme */
        body.tema-claro {
            --white:   #ffffff;
            --bg:      #f8fafc;
            --bg2:     #f1f5f9;
            --surface: #ffffff;
            --border:  #e2e8f0;
            --border2: #cbd5e1;
            --ink:     #1a1a1a;
            --ink2:    #4a4a4a;
            --ink3:    #64748b;
            --ink4:    #94a3b8;
            --blue:    #2563eb;
            --blue-l:  #dbeafe;
            --blue-m:  #93c5fd;
        }

        /* Reset */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            font-size: 16px;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width:5px; height:5px; }
        ::-webkit-scrollbar-track { background: var(--bg2); }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius:3px; }

        /* Layout */
        .layout { display:grid; grid-template-columns:240px 1fr; min-height:100vh; }
        
        /* Sidebar */
        .sidebar {
            background: var(--white);
            border-right: 1px solid var(--border);
            display:flex; flex-direction:column;
            padding: 0;
            position: sticky; top:0; height:100vh;
            overflow-y: auto;
            z-index: 100;
        }
        
        .sidebar-logo {
            padding: 24px 20px 20px;
            border-bottom: 1px solid var(--border);
            display:flex; align-items:center; gap:12px;
        }
        
        .logo-icon {
            width:38px; height:38px;
            background: linear-gradient(135deg, var(--blue), var(--indigo));
            border-radius: 10px;
            display:flex; align-items:center; justify-content:center;
            font-size:18px;
            box-shadow: 0 4px 12px rgba(33,150,243,.3);
            flex-shrink:0;
        }
        
        .logo-text { line-height:1.2; }
        .logo-text strong { font-size:17px; font-weight:800; color: var(--ink); letter-spacing:-0.5px; }
        .logo-text span { display:block; font-size:10px; color:var(--ink4); font-family:var(--mono); letter-spacing:.5px; text-transform:uppercase; }
        
        .sidebar-section { 
            padding: 20px 12px 8px; 
            font-size:10px; font-weight:600; color: var(--ink4); 
            text-transform:uppercase; letter-spacing:1px; font-family: var(--mono); 
        }
        
        .nav-item {
            display:flex; align-items:center; gap:10px;
            padding: 9px 14px;
            border-radius: var(--radius-sm);
            margin: 2px 8px;
            cursor:pointer;
            transition: all .18s;
            font-size:14px; font-weight:500;
            color: var(--ink3);
            border: none; background:none; width:calc(100% - 16px);
            text-align:left;
        }
        
        .nav-item:hover { background: var(--bg); color: var(--ink); }
        .nav-item.active { background: var(--blue-l); color: var(--blue); font-weight:600; }
        .nav-item .nav-icon { font-size:16px; width:20px; text-align:center; flex-shrink:0; }
        .nav-badge {
            margin-left:auto;
            background: var(--blue);
            color: white;
            font-size:10px; font-weight:700;
            padding:2px 7px; border-radius:20px;
            font-family: var(--mono);
        }
        
        .sidebar-footer { margin-top:auto; padding:16px; border-top:1px solid var(--border); }
        
        .license-pill {
            display:flex; align-items:center; gap:8px;
            padding:10px 14px;
            background: linear-gradient(135deg, var(--blue-l), var(--blue-m));
            border: 1px solid var(--blue-m);
            border-radius: var(--radius-sm);
            margin-bottom:10px;
        }
        
        .license-pill .lp-dot {
            width:8px; height:8px; border-radius:50%;
            background: var(--blue); flex-shrink:0;
            box-shadow:0 0 6px rgba(33,150,243,.5);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
        .license-pill .lp-text { font-size:12px; font-weight:600; color:var(--blue); }
        .license-pill .lp-sub { font-size:10px; color:var(--ink4); font-family:var(--mono); }
        
        .btn-salir {
            display:flex; align-items:center; justify-content:center; gap:8px;
            width:100%; padding:9px;
            background:none; border:1px solid var(--border);
            border-radius:var(--radius-sm);
            font-size:13px; font-weight:500; color:var(--ink3);
            cursor:pointer; transition:all .18s;
            font-family:var(--font);
        }
        .btn-salir:hover { background:var(--rose); border-color:var(--rose); color:white; }

        /* Main */
        .main { overflow:visible; display:flex; flex-direction:column; min-width:0; }
        
        .topbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height:60px;
            display:flex; align-items:center; justify-content:space-between;
            position:sticky; top:0; z-index:50;
        }
        
        .topbar-left { display:flex; flex-direction:column; }
        .topbar-title { font-size:17px; font-weight:700; color:var(--ink); letter-spacing:-.3px; }
        .topbar-sub { font-size:11px; color:var(--ink4); font-family:var(--mono); }
        
        .topbar-right { display:flex; align-items:center; gap:10px; }
        
        .topbar-btn {
            display:flex; align-items:center; gap:6px;
            padding:7px 14px;
            border-radius:var(--radius-sm);
            border:none; cursor:pointer;
            font-size:13px; font-weight:600;
            transition:all .18s; font-family:var(--font);
            min-height: 44px;
        }
        .topbar-btn.primary { background: var(--blue); color:white; box-shadow:0 2px 8px rgba(33,150,243,.3); }
        .topbar-btn.primary:hover { background:#1d4ed8; transform:translateY(-1px); }
        .topbar-btn.ghost { background:var(--bg); color:var(--ink2); border:1px solid var(--border); }
        .topbar-btn.ghost:hover { background:var(--bg2); }

        /* Content */
        .content { padding:28px 32px; flex:1; overflow-x: hidden; }

        /* Screens */
        .screen { display:none; }
        .screen.active { display:block; animation: fadeUp .25s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        /* Stats */
        .stats-row { display:grid; grid-template-columns: repeat(4,1fr); gap:16px; margin-bottom:28px; }
        .stat-card {
            background:var(--white);
            border:1px solid var(--border);
            border-radius:var(--radius);
            padding:20px 22px;
            position:relative;
            overflow:hidden;
            box-shadow:var(--shadow-sm);
            transition:all .2s;
        }
        .stat-card:hover { box-shadow:var(--shadow); transform:translateY(-2px); }
        .stat-number { font-size:32px; font-weight:800; color:var(--ink); letter-spacing:-1.5px; line-height:1; margin-bottom:4px; }
        .stat-label { font-size:12px; color:var(--ink4); font-weight:500; }

        /* Cards */
        .card {
            background:var(--white);
            border:1px solid var(--border);
            border-radius:var(--radius);
            box-shadow:var(--shadow-sm);
            overflow:visible;
            margin-bottom: 20px;
        }
        .card-header { padding:18px 22px 0; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
        .card-title { font-size:15px; font-weight:700; color:var(--ink); letter-spacing:-.2px; }
        .card-sub { font-size:12px; color:var(--ink4); margin-top:2px; }
        .card-body { padding:0 22px 22px; overflow:visible; }

        /* Forms */
        .form-group {
            display:flex; flex-direction:column; gap:5px;
            margin-bottom: 15px;
        }
        .form-group label {
            font-size:11px; font-weight:600; color:var(--ink3);
            text-transform:uppercase; letter-spacing:.4px; font-family:var(--mono);
        }
        .form-group input, .form-group select, .form-group textarea {
            padding:10px 14px;
            background:var(--bg);
            border:1px solid var(--border);
            border-radius:var(--radius-sm);
            font-size:14px;
            color:var(--ink);
            font-family:var(--font);
            transition:all .15s;
            min-height: 44px;
            width: 100%;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline:none; border-color:var(--blue); background:var(--white);
            box-shadow:0 0 0 3px rgba(33,150,243,.08);
        }

        /* Buttons */
        .btn {
            padding:12px 24px;
            border-radius:var(--radius-sm);
            border:none;
            font-size:14px;
            font-weight:600;
            cursor:pointer;
            transition:all .18s;
            font-family:var(--font);
            min-height: 44px;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            gap:8px;
        }
        .btn-primary { background:linear-gradient(135deg,var(--blue),var(--indigo)); color:white; box-shadow:0 2px 8px rgba(33,150,243,.3); }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(33,150,243,.35); }
        .btn-secondary { background:var(--bg); color:var(--ink2); border:1px solid var(--border); }
        .btn-secondary:hover { background:var(--bg2); }
        .btn-success { background:var(--green); color:white; }
        .btn-warning { background:var(--amber); color:#1a1a1a; }
        .btn-info { background:var(--teal); color:white; }

        /* Button Group */
        .button-group {
            display:flex;
            gap:15px;
            flex-wrap:wrap;
            justify-content:center;
            margin-top:20px;
        }

        /* Mobile Navigation */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 1px solid var(--border);
            padding: 6px 0 max(6px, env(safe-area-inset-bottom));
            z-index: 300;
            box-shadow: 0 -4px 20px rgba(15,23,42,.08);
        }
        .bottom-nav-inner { display: grid; grid-template-columns: repeat(5, 1fr); }
        .bn-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            padding: 6px 4px;
            cursor: pointer;
            border: none;
            background: none;
            font-family: var(--font);
            transition: all .15s;
            min-height: 48px;
        }
        .bn-icon { font-size: 22px; line-height: 1; transition: transform .15s; }
        .bn-label { font-size: 10px; font-weight: 600; color: var(--ink4); transition: color .15s; }
        .bn-item.active .bn-icon { transform: translateY(-2px); }
        .bn-item.active .bn-label { color: var(--blue); }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: var(--radius-sm);
            transition: background .15s;
            min-width: 44px;
            min-height: 44px;
        }
        .hamburger:hover { background: var(--bg2); }
        .hamburger span { display: block; width: 20px; height: 2px; background: var(--ink2); border-radius: 2px; margin: 4px 0; transition: all .25s; }

        /* Sidebar Overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,.4);
            backdrop-filter: blur(4px);
            z-index: 250;
        }
        .sidebar-overlay.open { display: block; }

        /* Responsive */
        @media (max-width: 1024px) {
            .layout { grid-template-columns: 200px 1fr; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; }
            .content { padding: 16px 16px 90px !important; }
            .sidebar {
                position: fixed;
                left: -260px;
                top: 0;
                bottom: 0;
                width: 260px;
                z-index: 260;
                transition: left .28s cubic-bezier(.4,0,.2,1);
            }
            .sidebar.open { left: 0; box-shadow: var(--shadow-lg); }
            .hamburger { display: flex !important; }
            .bottom-nav { display: block !important; }
            .topbar { padding: 0 16px; height: 54px; }
            .topbar-sub { display: none; }
            .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-number { font-size: 26px; }
        }

        /* Utilities */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 16px; }
        .mb-2 { margin-bottom: 16px; }
    </style>
</head>
<body>

        <!-- ══════════════ SIDEBAR ══════════════ -->

            <div class="sidebar-logo">
                <div class="logo-icon">🛡️</div>
                <div class="logo-text">
                    <strong>RayoShield</strong>

            <div class="topbar">

                    <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Menú">

                    </button>
                    <div>

                </div>
                <div class="topbar-right">

                        </div>
                        <div class="stat-card">
                            <div class="stat-number">420</div>
                            <div class="stat-label">Preguntas</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">15</div>
                            <div class="stat-label">Casos</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">4</div>
                            <div class="stat-label">Niveles</div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <div>
                                <div class="card-title">🛡️ Bienvenido a RayoShield Exam</div>

                            </div>
                        </div>
                        <div class="card-body">
                            <div id="licencia-info" style="padding:15px;background:#f5f5f5;border-radius:10px;text-align:center;font-weight:bold;margin:15px 0;">

                            <div id="usuario-info" style="padding:15px;background:#E3F2FD;border-radius:10px;margin:15px 0;font-size:14px;">

    <!-- Overlay para cerrar sidebar en móvil -->

    <!-- Barra inferior — solo móvil -->

    </nav>

    <script>
        // Toggle sidebar en móvil
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isOpen  = sidebar.classList.contains('open');
            if (isOpen) { closeSidebar(); } else {
                sidebar.classList.add('open');
                overlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            }
        }
        
        function closeSidebar() {
            document.querySelector('.sidebar').classList.remove('open');
            document.getElementById('sidebar-overlay').classList.remove('open');
            document.body.style.overflow = '';
        }

        // Actualizar topbar title según pantalla
        const screenTitles = {
            'home-screen': ['Inicio', 'Plataforma de certificación'],
            'select-exam-screen': ['Exámenes', 'Selecciona categoría'],
            'exam-screen': ['Examen', 'En progreso'],
            'result-screen': ['Resultado', 'Calificación'],
            'history-screen': ['Historial', 'Exámenes completados'],
            'license-screen': ['Licencia', 'Gestión de plan'],
            'info-screen': ['Información', 'Acerca de'],
